name: build-check

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build artifacts and verify against working tree
        run: python3 src/scripts/build.py --check
